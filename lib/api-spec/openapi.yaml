openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sistem Informasi Kepegawaian dan Status Kehadiran API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee management
  - name: attendance
    description: Attendance and leave management
  - name: documents
    description: Document management
  - name: inventory
    description: Inventory in/out management
  - name: complaints
    description: Customer complaints management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /employees:
    get:
      operationId: getEmployees
      tags: [employees]
      summary: Get all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /attendance:
    get:
      operationId: getAttendanceRecords
      tags: [attendance]
      summary: Get attendance records
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [izin, tidak_hadir, cuti, dinas]
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendanceRecord
      tags: [attendance]
      summary: Create attendance record (izin/absensi)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceRecord"
      responses:
        "201":
          description: Attendance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary counts by status
      responses:
        "200":
          description: Summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  /attendance/{id}:
    put:
      operationId: updateAttendanceRecord
      tags: [attendance]
      summary: Update attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceRecord"
      responses:
        "200":
          description: Attendance record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    delete:
      operationId: deleteAttendanceRecord
      tags: [attendance]
      summary: Delete attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /documents:
    get:
      operationId: getDocuments
      tags: [documents]
      summary: Get all documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [SP3S, SIJ, CUTI, DINAS, SKMJ, SURAT_TUGAS]
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocument"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /documents/summary:
    get:
      operationId: getDocumentSummary
      tags: [documents]
      summary: Get document counts by type
      responses:
        "200":
          description: Summary of documents per type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  /inventory/items:
    get:
      operationId: getInventoryItems
      tags: [inventory]
      summary: Get all inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create new inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItem"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/items/{id}:
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItem"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /inventory/transactions:
    get:
      operationId: getInventoryTransactions
      tags: [inventory]
      summary: Get inventory transactions
      parameters:
        - name: tipe
          in: query
          schema:
            type: string
            enum: [masuk, keluar]
        - name: itemId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryTransaction"
    post:
      operationId: createInventoryTransaction
      tags: [inventory]
      summary: Create inventory transaction (barang masuk/keluar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryTransaction"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryTransaction"

  /inventory/transactions/{id}:
    delete:
      operationId: deleteInventoryTransaction
      tags: [inventory]
      summary: Delete inventory transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory summary
      responses:
        "200":
          description: Inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  /complaints:
    get:
      operationId: getComplaints
      tags: [complaints]
      summary: Get all complaints
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [baru, diproses, selesai, ditolak]
        - name: prioritas
          in: query
          schema:
            type: string
            enum: [rendah, sedang, tinggi]
        - name: kategori
          in: query
          schema:
            type: string
            enum: [produk, layanan, pengiriman, lainnya]
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Create new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaint"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /complaints/{id}:
    get:
      operationId: getComplaint
      tags: [complaints]
      summary: Get complaint by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
    put:
      operationId: updateComplaint
      tags: [complaints]
      summary: Update complaint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaint"
      responses:
        "200":
          description: Complaint updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
    delete:
      operationId: deleteComplaint
      tags: [complaints]
      summary: Delete complaint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /complaints/summary:
    get:
      operationId: getComplaintSummary
      tags: [complaints]
      summary: Get complaint counts by status
      responses:
        "200":
          description: Complaint summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Employee:
      type: object
      properties:
        id:
          type: integer
        nama:
          type: string
        nopek:
          type: string
        foto:
          type: string
          nullable: true
        jabatan:
          type: string
          nullable: true
        departemen:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - nama
        - nopek
        - createdAt

    CreateEmployee:
      type: object
      properties:
        nama:
          type: string
        nopek:
          type: string
        foto:
          type: string
          nullable: true
        jabatan:
          type: string
          nullable: true
        departemen:
          type: string
          nullable: true
      required:
        - nama
        - nopek

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employee:
          $ref: "#/components/schemas/Employee"
        status:
          type: string
          enum: [izin, tidak_hadir, cuti, dinas]
        tanggal:
          type: string
        alasan:
          type: string
          nullable: true
        keterangan:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - employeeId
        - status
        - tanggal
        - createdAt

    CreateAttendanceRecord:
      type: object
      properties:
        employeeId:
          type: integer
        status:
          type: string
          enum: [izin, tidak_hadir, cuti, dinas]
        tanggal:
          type: string
        alasan:
          type: string
          nullable: true
        keterangan:
          type: string
          nullable: true
      required:
        - employeeId
        - status
        - tanggal

    AttendanceSummary:
      type: object
      properties:
        izin:
          type: integer
        tidak_hadir:
          type: integer
        cuti:
          type: integer
        dinas:
          type: integer
      required:
        - izin
        - tidak_hadir
        - cuti
        - dinas

    Document:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employee:
          $ref: "#/components/schemas/Employee"
        type:
          type: string
          enum: [SP3S, SIJ, CUTI, DINAS, SKMJ, SURAT_TUGAS]
        nomorSurat:
          type: string
          nullable: true
        perihal:
          type: string
          nullable: true
        tanggal:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        keterangan:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - employeeId
        - type
        - tanggal
        - status
        - createdAt

    CreateDocument:
      type: object
      properties:
        employeeId:
          type: integer
        type:
          type: string
          enum: [SP3S, SIJ, CUTI, DINAS, SKMJ, SURAT_TUGAS]
        nomorSurat:
          type: string
          nullable: true
        perihal:
          type: string
          nullable: true
        tanggal:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        keterangan:
          type: string
          nullable: true
      required:
        - employeeId
        - type
        - tanggal
        - status

    DocumentSummary:
      type: object
      properties:
        SP3S:
          type: integer
        SIJ:
          type: integer
        CUTI:
          type: integer
        DINAS:
          type: integer
        SKMJ:
          type: integer
        SURAT_TUGAS:
          type: integer
      required:
        - SP3S
        - SIJ
        - CUTI
        - DINAS
        - SKMJ
        - SURAT_TUGAS

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        kodeBarang:
          type: string
        namaBarang:
          type: string
        kategori:
          type: string
          nullable: true
        satuan:
          type: string
          nullable: true
        stok:
          type: integer
        keterangan:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - kodeBarang
        - namaBarang
        - stok
        - createdAt

    CreateInventoryItem:
      type: object
      properties:
        kodeBarang:
          type: string
        namaBarang:
          type: string
        kategori:
          type: string
          nullable: true
        satuan:
          type: string
          nullable: true
        stok:
          type: integer
        keterangan:
          type: string
          nullable: true
      required:
        - kodeBarang
        - namaBarang
        - stok

    InventoryTransaction:
      type: object
      properties:
        id:
          type: integer
        itemId:
          type: integer
        item:
          $ref: "#/components/schemas/InventoryItem"
        tipe:
          type: string
          enum: [masuk, keluar]
        jumlah:
          type: integer
        tanggal:
          type: string
        keterangan:
          type: string
          nullable: true
        penanggungJawab:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - itemId
        - tipe
        - jumlah
        - tanggal
        - createdAt

    CreateInventoryTransaction:
      type: object
      properties:
        itemId:
          type: integer
        tipe:
          type: string
          enum: [masuk, keluar]
        jumlah:
          type: integer
        tanggal:
          type: string
        keterangan:
          type: string
          nullable: true
        penanggungJawab:
          type: string
          nullable: true
      required:
        - itemId
        - tipe
        - jumlah
        - tanggal

    InventorySummary:
      type: object
      properties:
        totalItems:
          type: integer
        totalMasuk:
          type: integer
        totalKeluar:
          type: integer
      required:
        - totalItems
        - totalMasuk
        - totalKeluar

    Complaint:
      type: object
      properties:
        id:
          type: integer
        namaPelanggan:
          type: string
        kontakPelanggan:
          type: string
          nullable: true
        kategori:
          type: string
          enum: [produk, layanan, pengiriman, lainnya]
        judul:
          type: string
        deskripsi:
          type: string
        status:
          type: string
          enum: [baru, diproses, selesai, ditolak]
        prioritas:
          type: string
          enum: [rendah, sedang, tinggi]
        tanggal:
          type: string
        penangananOleh:
          type: string
          nullable: true
        catatanPenanganan:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - namaPelanggan
        - kategori
        - judul
        - deskripsi
        - status
        - prioritas
        - tanggal
        - createdAt

    CreateComplaint:
      type: object
      properties:
        namaPelanggan:
          type: string
        kontakPelanggan:
          type: string
          nullable: true
        kategori:
          type: string
          enum: [produk, layanan, pengiriman, lainnya]
        judul:
          type: string
        deskripsi:
          type: string
        status:
          type: string
          enum: [baru, diproses, selesai, ditolak]
        prioritas:
          type: string
          enum: [rendah, sedang, tinggi]
        tanggal:
          type: string
        penangananOleh:
          type: string
          nullable: true
        catatanPenanganan:
          type: string
          nullable: true
      required:
        - namaPelanggan
        - kategori
        - judul
        - deskripsi
        - status
        - prioritas
        - tanggal

    ComplaintSummary:
      type: object
      properties:
        baru:
          type: integer
        diproses:
          type: integer
        selesai:
          type: integer
        ditolak:
          type: integer
      required:
        - baru
        - diproses
        - selesai
        - ditolak
